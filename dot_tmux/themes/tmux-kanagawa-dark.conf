set-option -g status "on"

# default statusbar color
set status-bg "#1F1F28"

# default window title colors
set-window-option -g window-status-style bg="#2D4F67",fg="#1F1F28" # bg=yellow, fg=bg1

# default window with an activity alert
set-window-option -g window-status-activity-style bg="#1F1F28",fg=red # bg=bg1, fg=fg3

# active window title colors
set-window-option -g window-status-current-style bg=red,fg="#1F1F28" # fg=bg1

# pane border
set-option -g pane-active-border-style fg="#2D4F67" #fg2
set-option -g pane-border-style fg="#1F1F28" #bg1

# message infos
set-option -g message-style bg="#16161D",fg="#C8C093" # bg=bg2, fg=fg1

# writing commands inactive
set-option -g message-command-style bg="#16161D",fg="#C8C093" # bg=fg3, fg=bg1

# pane number display
set-option -g display-panes-active-colour "#2D4F67" #fg2
set-option -g display-panes-colour "#1F1F28" #bg1

# Theme settings mixed with colors (unfortunately, but there is no cleaner way)
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[bg=#363646,fg=#C8C093] #S #[bg=#1F1F28,fg=#363646,nobold,noitalics,nounderscore]"
set-option -g status-right ""

set-window-option -g window-status-current-format "#[bg=#2D4F67,fg=#1F1F28,nobold,noitalics,nounderscore]#[bg=#2D4F67,fg=#C8C093] #I #[bg=#2D4F67,fg=#C8C093,bold] #W#{?window_zoomed_flag,*Z,} #[bg=#1F1F28,fg=#2D4F67,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[bg=#16161D,fg=#1F1F28,noitalics]#[bg=#16161D,fg=#C8C093] #I #[bg=#16161D,fg=#C8C093] #W #[bg=#1F1F28,fg=#16161D,noitalics]"
