import:
  - ~/.config/alacritty/kanagawa-dragon.yaml

# Font configuration
font:
  # Bold font face
  bold:
    family: BerkeleyMonoVariable Nerd Font
    style: Regular

  # Bold italic font face
  bold_italic:
    family: BerkeleyMonoVariable Nerd Font
    # The `style` can be specified to pick a specific face.
    style: Italic

  # Italic font face
  italic:
    family: BerkeleyMonoVariable Nerd Font
    style: Italic

  # Normal (roman) font face
  normal:
    family: BerkeleyMonoVariable Nerd Font
    style: Regular

  # Point size
  size: 14.0

window:
  option_as_alt: Both
  padding:
    x: 5
    y: 5
  decorations: buttonless
  startup_mode: Maximized

env:
  TERM: xterm-256color
