# Font configuration
font:
  # Bold font face
  bold:
    family: BerkeleyMonoVariable Nerd Font
    style: Regular

  # Bold italic font face
  bold_italic:
    family: BerkeleyMonoVariable Nerd Font
    # The `style` can be specified to pick a specific face.
    style: Italic

  # Italic font face
  italic:
    family: BerkeleyMonoVariable Nerd Font
    style: Italic

  # Normal (roman) font face
  normal:
    family: BerkeleyMonoVariable Nerd Font
    style: Regular

  # Point size
  size: 15.0
  offset:
    y: 0
    x: 0
  glyph_offset:
    y: 0
    x: 0

window:
  option_as_alt: Both
  padding:
    x: 2
    y: 2
  decorations: buttonless
  startup_mode: Maximized
  dynamic_padding: false

env:
  TERM: xterm-256color
# Nightfox Alacritty Colors
# Style: nightfox
# Upstream: https://github.com/edeneast/nightfox.nvim/raw/main/extra/nightfox/nightfox_alacritty.yml
colors:
  # Default colors
  primary:
    background: "0x192330"
    foreground: "0xcdcecf"
  # Normal colors
  normal:
    black: "0x393b44"
    red: "0xc94f6d"
    green: "0x81b29a"
    yellow: "0xdbc074"
    blue: "0x719cd6"
    magenta: "0x9d79d6"
    cyan: "0x63cdcf"
    white: "0xdfdfe0"
  # Bright colors
  bright:
    black: "0x575860"
    red: "0xd16983"
    green: "0x8ebaa4"
    yellow: "0xe0c989"
    blue: "0x86abdc"
    magenta: "0xbaa1e2"
    cyan: "0x7ad5d6"
    white: "0xe4e4e5"
  indexed_colors:
    - { index: 16, color: "0xf4a261" }
    - { index: 17, color: "0xd67ad2" }
