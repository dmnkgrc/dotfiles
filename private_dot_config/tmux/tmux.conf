# Change prefix from 'Ctrl+B' to 'Ctrl+A'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Hot reloading tmux.conf with CTRL-A + r
unbind r
bind r source-file "~/.config/.tmux/tmux.conf"

set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g escape-time 0          # zero-out escape time delay
set -g history-limit 1000000  # significantly increase history size
set -g mouse on               # enable mouse support
set -g set-clipboard on       # use system clipboard
set -g status-interval 2      # update status every 2 seconds
set -g status-left-length 200 # increase status line length
set -g allow-passthrough 1
set -g status-position bottom

set-option -g default-terminal 'screen-256color'
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-features ',alacritty:RGB'
set-option -ga terminal-overrides ',alacritty:Tc'

bind '%' split-window -c '#{pane_current_path}' -h
bind '"' split-window -c '#{pane_current_path}'
bind | split-window -c '#{pane_current_path}' -h
bind _ split-window -c '#{pane_current_path}' -v
bind c new-window -c '#{pane_current_path}'
bind g new-window -n '' lazygit
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r G run-shell "~/.local/share/nvim/lazy/harpoon/scripts/tmux/switch-back-to-nvim"

set -g pane-active-border-style 'fg=default,bg=default'
set -g pane-border-style 'fg=default,bg=default'
set -g status-style 'bg=default' # transparent
set -g window-status-current-format '#[fg=color1]#I #W'
set -g window-status-format '#[fg=default]#I #W'
set -g mode-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g message-command-style bg=default,fg=yellow
set-window-option -g window-status-separator " | "

set -g status-left '#[fg=color7,bold]#S #[fg=default,nobold]'
set -g status-right "#{pomodoro_status}"
set -ga status-right '#(gitmux "#{pane_current_path}") '

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'olimorris/tmux-pomodoro-plus'
set -g @plugin 'joshmedeski/t-smart-tmux-session-manager'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# tmux-continuum & tmux-resurrect
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @pomodoro_on " 🍅 "       # The formatted output when the pomodoro is running
set -g @pomodoro_complete " ✅ " # The formatted output when the pomodoro is finished
set -g @pomodoro_start 'P'     # Start a Pomodoro with tmux-prefix + p
set -g @pomodoro_cancel '-'    # Cancel a Pomodoro with tmux-prefix key + P

set -g @t-fzf-prompt '  '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
