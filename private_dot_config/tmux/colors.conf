# Start flavours
# Base16 Nightfox
# Scheme author: https://github.com/EdenEast/nightfox.nvim
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#495360,bg=#252f3c"

# default window title colors
set-window-option -g window-status-style "fg=#495360,bg=default"

# active window title colors
set-window-option -g window-status-current-style "fg=#dbc074,bg=default"

# pane border
set-option -g pane-border-style "fg=#252f3c"
set-option -g pane-active-border-style "fg=#313b48"

# message text
set-option -g message-style "fg=#c0c8d5,bg=#252f3c"

# pane number display
set-option -g display-panes-active-colour "#8ebaa4"
set-option -g display-panes-colour "#dbc074"

# clock
set-window-option -g clock-mode-colour "#8ebaa4"

# copy mode highligh
set-window-option -g mode-style "fg=#495360,bg=#313b48"

# bell
set-window-option -g window-status-bell-style "fg=#252f3c,bg=#e26886"
# End flavours

set-option -g status-style "fg=#c8c093,bg=default"
set -g status-left "#[fg=blue,bold]  #S   "
set -g status-right "#[fg=#b4befe,bold]%a %Y-%m-%d 󱑒 %l:%M %p"
set-window-option -g window-status-current-style "fg=magenta,bg=default"
set -g window-status-current-format '#[fg=magenta] *#I #W'
set -g window-status-format '#[fg=gray] #I #W'
set -g window-status-last-style 'fg=white,bg=black'
set -g default-terminal "${TERM}"
